<html>
    <head>
        <script>
            let a=5;
            let b=2;
            let count=0;
           i=setInterval(()=>{document.getElementById('demo').innerHTML=++a + b++ 
                         count++
                            if(count==5)
                                {
                                    clearInterval(i)
                                }
                            },1000)
                            
        </script>
    </head>
    <body>
        <p id="demo"></p>
    </body>
</html>
