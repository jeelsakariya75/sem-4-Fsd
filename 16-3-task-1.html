<!-- initialise two variable and increment both the varable itch time  display the adition or both the varable and print <summary></summary>  -->
<html>
    <head>
        <script>
            let a=5;
            let b=2;
            setInterval(()=>{document.getElementById('demo').innerHTML=++a + b++},1000)
        </script>
    </head>
    <body>
        <p id="demo"></p>
    </body>
</html>
