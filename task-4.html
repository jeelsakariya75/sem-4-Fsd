<html>
    <head>
        <script>
            function fun()
            {
                text='{"name":"jeel","dob":"2007-08-19"}'
                obj=JSON.parse(text)
                console.log(obj.dob)
                date=new Date(obj.dob)
                document.getElementById("demo").innerHTML="Birthday of"+obj.name+"is"+date
            }
        </script>
    </head>
    <body>
        <p id="demo"></p>
        <button onclick="fun()">Click me</button>
    </body>
</html>
